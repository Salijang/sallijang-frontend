server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA 라우팅 — React Router가 처리하도록 모든 경로를 index.html로 fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /service/user/ {
        rewrite ^/service/user/(.*)$ /$1 break;
        proxy_pass http://user-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /service/product/ {
        rewrite ^/service/product/(.*)$ /$1 break;
        proxy_pass http://product-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /service/order/ {
        rewrite ^/service/order/(.*)$ /$1 break;
        proxy_pass http://order-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /service/notify/ {
        rewrite ^/service/notify/(.*)$ /$1 break;
        proxy_pass http://notify-service:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

}
