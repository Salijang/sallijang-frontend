name: Trivy Image Security Scan

on:
  push:
    branches:
      - main
      - develop

jobs:
  trivy-image-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t sallijang-frontend:latest .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sallijang-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Send Slack alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data '{
            "text":"🚨 Trivy Image Security Alert\nRepository: sallijang-frontend\nHIGH/CRITICAL 이미지 취약점 발견됨\n확인: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }' \
          "$SLACK_WEBHOOK_URL"
