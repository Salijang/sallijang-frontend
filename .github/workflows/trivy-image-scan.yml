name: Trivy Image Security Scan

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - '.github/workflows/trivy-image-scan.yml'

jobs:
  trivy-image-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t sallijang-frontend:latest .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sallijang-frontend:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'

      - name: Send Slack alert on Trivy failure
        if: steps.trivy_scan.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ISSUE="HIGH/CRITICAL 이미지 보안 이슈가 발견되었습니다."

          if [ -f trivy-image-results.txt ]; then
            FOUND_ISSUE=$(grep -m 1 "HIGH" trivy-image-results.txt || true)

            if [ -z "$FOUND_ISSUE" ]; then
              FOUND_ISSUE=$(grep -m 1 "CRITICAL" trivy-image-results.txt || true)
            fi

            if [ -n "$FOUND_ISSUE" ]; then
              ISSUE="$FOUND_ISSUE"
            fi
          fi

          jq -n \
            --arg text "🛡️ *Trivy Image Security Alert*
              <@U0A5ZUZRT7A>
              Repository: sallijang-*frontend*
              ${ISSUE}
              확인: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                          '{text: $text}' > slack-payload.json

          curl -X POST \
            -H 'Content-type: application/json' \
            --data @slack-payload.json \
            "$SLACK_WEBHOOK_URL"
