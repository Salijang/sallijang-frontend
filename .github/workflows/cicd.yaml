name: CI to AWS ECR (Frontend)

on:
  push:
    branches: [ "dev_yji" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Node.js 환경 설정 (React 빌드 확인용)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 2. 의존성 설치 및 빌드 테스트
      # Docker 빌드 전에 미리 빌드 오류가 없는지 확인하는 단계입니다.
      - name: Install dependencies and Build
        run: |
          npm install
          npm run build

      # 3. AWS 자격 증명 설정 (Secrets 기반)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }} # ap-southeast-2로 설정되어 있어야 함

      # 4. Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 5. Docker 빌드 및 ECR 푸시
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ github.event.repository.name }} # sallijang-frontend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 빌드 및 태그 적용
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # ECR로 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 6. 매니페스트 레포지토리 체크아웃
      - name: Checkout Manifest Repository
        uses: actions/checkout@v4
        with:
          repository: Salijang/sallijang-manifest
          token: ${{ secrets.GHA_TOKEN }}
          path: manifest

      # 7. Kustomize 설치
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      # 8. Kustomize를 사용하여 이미지 태그 업데이트 및 푸시
      - name: Update Kubernetes resources
        run: |
          cd manifest/base/frontend
          REAL_IMAGE_URL="${{ steps.login-ecr.outputs.registry }}/${{ github.event.repository.name }}"
          kustomize edit set image frontend-image=$REAL_IMAGE_URL:${{ github.sha }}
          cat kustomization.yaml
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add kustomization.yaml
          git diff --cached --quiet || git commit -m "chore(frontend): update image tag to ${{ github.sha }} [skip ci]"
          git push origin main