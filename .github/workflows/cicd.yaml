name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches: [ "main", "dev_yji" ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::594486941613:role/pickup-github-actions-role
          aws-region: ap-northeast-2

      - name: Read deploy config from SSM
        run: |
          BUCKET=$(aws ssm get-parameter --name /pickup/prod/s3/frontend-bucket-name --query Parameter.Value --output text)
          DISTRIBUTION_ID=$(aws ssm get-parameter --name /pickup/prod/cloudfront/frontend-distribution-id --query Parameter.Value --output text)
          echo "FRONTEND_BUCKET=$BUCKET" >> $GITHUB_ENV
          echo "CLOUDFRONT_DISTRIBUTION_ID=$DISTRIBUTION_ID" >> $GITHUB_ENV

      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${{ env.FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp dist/index.html s3://${{ env.FRONTEND_BUCKET }}/index.html \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"
