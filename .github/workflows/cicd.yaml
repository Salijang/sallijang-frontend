name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches: [ "main", "dev_yji" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # dist/ → S3 프론트엔드 버킷 동기화
      # --delete: S3에만 남아있는 구버전 파일 제거
      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html은 짧은 캐시 (CloudFront TTL 5분과 일치)
          aws s3 cp dist/index.html s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "public, max-age=300"

      # 배포 후 CloudFront 캐시 무효화
      # index.html만 무효화 — 나머지 정적 자산은 파일명에 해시가 포함되어 자동 갱신
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/index.html"
